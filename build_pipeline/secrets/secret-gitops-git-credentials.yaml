apiVersion: v1
kind: Secret
metadata:
  name: gitops-git-credentials
  namespace: janine-dev
type: Opaque
stringData:
  # Git credentials file for HTTPS authentication
  # Format: https://username:token@github.com
  # For GitHub PATs, username can be any value (GitHub ignores it and uses the token)
  # Using 'x' as a standard placeholder for PAT authentication
  # Note: This uses the same GitHub PAT token from argocd/repository-secret.yaml
  .git-credentials: |
    https://x:TODO: insert your secret@github.com
  # Git config file
  # .gitconfig: |
  #   [credential]
  #     helper = store
  #   [user]
  #     name = Tekton Pipeline
  #     email = tekton@openshift.local

