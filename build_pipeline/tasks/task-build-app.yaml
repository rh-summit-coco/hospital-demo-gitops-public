apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/categories: Image Build
    tekton.dev/displayName: buildah (Red Hat)
    tekton.dev/pipelines.minVersion: 0.17.0
    tekton.dev/platforms: linux/amd64,linux/s390x,linux/ppc64le,linux/arm64
    tekton.dev/tags: image-build
  labels:
    app.kubernetes.io/version: '0.6'
  name: build-app
  namespace: janine-dev
spec:
  description: 'Buildah task builds source into a container image and then pushes
    it to a container registry.

    This task uses Red Hat''s buildah image to avoid authentication issues with external
    registries.'
  params:
  - description: Reference of the image buildah will produce.
    name: IMAGE
    type: string
  - description: Tag of the image buildah will produce.
    name: IMAGE_TAG
    type: string
  - default: registry.redhat.io/rhel8/buildah:latest
    description: The location of the buildah builder image.
    name: BUILDER_IMAGE
    type: string
  - default: overlay
    description: Set buildah storage driver
    name: STORAGE_DRIVER
    type: string
  - default: ./Dockerfile
    description: Path to the Dockerfile to build.
    name: DOCKERFILE
    type: string
  - default: .
    description: Path to the directory to use as context.
    name: CONTEXT
    type: string
  - default: 'true'
    description: Verify the TLS on the registry endpoint (for push/pull to a non-TLS
      registry)
    name: TLSVERIFY
    type: string
  - default: oci
    description: The format of the built container, oci or docker
    name: FORMAT
    type: string
  - default: ''
    description: Extra parameters passed for the build command when building images.
    name: BUILD_EXTRA_ARGS
    type: string
  results:
  - description: Digest of the image just built.
    name: IMAGE_DIGEST
    type: string
  - description: Image repository where the built image would be pushed to
    name: IMAGE_URL
    type: string
  env:
  - name: CONTAINERS_STORAGE_CONF
    value: $(workspaces.buildah-storage.path)/containers-storage.conf
  steps:
  - computeResources: {}
    image: $(params.BUILDER_IMAGE)
    name: build-and-push
    script: |
      #!/bin/bash
      set -e

      echo "No docker credentials found, using default"
      echo "🏗️  Building container image with buildah"
      echo "========================================"
      echo "Image: $(params.IMAGE)"
      echo "Dockerfile: $(params.DOCKERFILE)"
      echo "Context: $(params.CONTEXT)"
      echo "Storage Driver: overlay"
      echo "TLS Verify: $(params.TLSVERIFY)"
      echo ""

      echo "🔍 Debug: Current directory: $(pwd)"
      echo "🔍 Debug: Directory contents:"
      ls -la
      echo ""

      # Configure buildah to use workspace for storage
      BUILDAH_STORAGE_PATH="$(workspaces.buildah-storage.path)"
      echo "🔍 Debug: buildah-storage workspace path: $BUILDAH_STORAGE_PATH"

      rm -rf $BUILDAH_STORAGE_PATH/*
      ls -la $BUILDAH_STORAGE_PATH
      echo ""

      # Create directory if it doesn't exist (workspace might be empty initially)
      if [ -n "$BUILDAH_STORAGE_PATH" ]; then
        mkdir -p "$BUILDAH_STORAGE_PATH"
        echo "🔧 Configuring buildah to use shared workspace storage"
        echo "[storage]
        driver = \"overlay\"
        graphroot = \"$BUILDAH_STORAGE_PATH\"
        runroot = \"/tmp/containers/run\"
        " > "$BUILDAH_STORAGE_PATH/containers-storage.conf"
        export CONTAINERS_STORAGE_CONF="$BUILDAH_STORAGE_PATH/containers-storage.conf"
        echo "   Storage root: $BUILDAH_STORAGE_PATH"
        echo "   Config file created: $BUILDAH_STORAGE_PATH/containers-storage.conf"
      else
        echo "⚠️  Warning: buildah-storage workspace path is empty or not set"
      fi

      ls -la $BUILDAH_STORAGE_PATH
      echo ""

      buildah build --root $BUILDAH_STORAGE_PATH \
        --format=docker \
        --tls-verify=$(params.TLSVERIFY) \
        --no-cache \
        -f $(params.DOCKERFILE) \
        -t $(params.IMAGE):$(params.IMAGE_TAG) \
        $(params.CONTEXT)

      # Push to internal registry
      echo ""
      echo "📤 Pushing to internal registry..."
      PUSH_OUTPUT=$(buildah push --root $BUILDAH_STORAGE_PATH  --tls-verify=$(params.TLSVERIFY) $(params.IMAGE):$(params.IMAGE_TAG) docker://$(params.IMAGE):$(params.IMAGE_TAG) 2>&1)
      echo "$PUSH_OUTPUT"

      # Extract digest from push output
      IMAGE_DIGEST=$(echo "$PUSH_OUTPUT" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1)
      if [ -n "$IMAGE_DIGEST" ]; then
        echo "$IMAGE_DIGEST" > $(results.IMAGE_DIGEST.path)
        echo "📋 Image digest: $IMAGE_DIGEST"
      fi
      echo "$(params.IMAGE):$(params.IMAGE_TAG)" > $(results.IMAGE_URL.path)

      echo ""
      echo "✅ Container image built and pushed to internal registry"
      echo "🎯 Image: $(params.IMAGE):$(params.IMAGE_TAG)"
      echo "🎯 Image: $(params.IMAGE)@$IMAGE_DIGEST"
    securityContext:
      privileged: true
    workingDir: $(workspaces.source.path)
  workspaces:
  - name: source
  - name: buildah-storage
    description: Shared workspace for buildah storage
  - name: sslcertdir
    optional: true
  - description: An optional workspace that allows providing a .docker/config.json
      file for Buildah to access the container registry. The file should be placed
      at the root of the Workspace with name config.json.
    name: dockerconfig
    optional: true
